{% extends "base.html" %}
{% block title %}Create Costing Sheet{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">Create Costing Sheet</h2>
    <p>Project: <strong>{{ project.name }}</strong></p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-primary">Create Costing Sheet</button>
      <a href="{% url 'project_detail' project.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
