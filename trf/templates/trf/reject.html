{% extends "base.html" %}

{% block title %}Reject TRF — {{ trf.project_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h2 class="mb-1">Reject TRF</h2>
    <p class="text-muted mb-4">
      <strong>{{ trf.project_name }}</strong>
      <span class="badge bg-warning text-dark ms-2">{{ trf.get_status_display }}</span>
    </p>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="reason" class="form-label fw-semibold">Rejection Reason <span class="text-danger">*</span></label>
        <textarea
          id="reason"
          name="reason"
          class="form-control"
          rows="4"
          required
          placeholder="Explain why this TRF is being rejected…"
        ></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">Confirm Rejection</button>
        <a href="{% url 'trf_detail' trf.pk %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
